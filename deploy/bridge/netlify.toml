# Bridge Netlify site: set **Package directory** to `deploy/bridge` in the Netlify UI;
# leave **Base directory** empty so it defaults to the repo root. Per Netlify monorepo
# docs, `functions` and `publish` below are relative to the base directory (repo root),
# not to this folder — do not use `../..` here (that escapes the repo and fails deploy).
[build]
  command = "npm install && node scripts/netlify-redirects.mjs && cd hub/gateway && npm ci && cd ../bridge && npm ci"
  functions = "netlify/functions"
  publish = "public"

[build.environment]
  # Netlify’s build tooling can error on Node 22 (e.g. @netlify/build internal TypeError).
  # Gateway site uses root netlify.toml with NODE_VERSION=20; bridge must pin the same.
  NODE_VERSION = "20"
  USE_BRIDGE_FUNCTION = "true"

# Bridge index/search loads sqlite-vec + better-sqlite3 native code; must not be esbuild-bundled
# (sqlite-vec getLoadablePath uses import.meta.url — bundling yields Invalid URL input '.').
[functions]
  node_bundler = "esbuild"
  external_node_modules = [
    "better-sqlite3",
    "sqlite-vec",
    "sqlite-vec-linux-x64",
    "sqlite-vec-linux-arm64",
    "sqlite-vec-darwin-x64",
    "sqlite-vec-darwin-arm64",
    "sqlite-vec-windows-x64"
  ]

# Back up now (/api/v1/vault/sync) can exceed the default ~10s limit (export + N proposal GETs + GitHub API).
# Align with gateway proxy budget (root netlify.toml [functions."gateway"] timeout = 26).
# exceljs: see root netlify.toml [functions."bridge"] (large bundle; keep external for the bridge function).
[functions."bridge"]
  timeout = 26
  external_node_modules = ["exceljs"]

# Send all requests to the bridge function with path preserved (/:splat).
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/bridge/:splat"
  status = 200
  force = true
