# Bridge Netlify site: if the site’s **Base directory** is `deploy/bridge`, paths below
# are relative to that folder — the build must `cd` to the repo root first.
# Recommended: leave **Base directory empty** (repo root), set `USE_BRIDGE_FUNCTION=true`
# in Netlify env, and use the root `netlify.toml` so you do not need this file.
[build]
  command = "cd ../.. && npm install && node scripts/netlify-redirects.mjs && cd hub/gateway && npm ci && cd ../bridge && npm ci"
  functions = "../../netlify/functions"
  publish = "../../public"

# Send all requests to the bridge function with path preserved (/:splat).
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/bridge/:splat"
  status = 200
  force = true
