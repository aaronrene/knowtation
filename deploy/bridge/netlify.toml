# Bridge Netlify site: set **Package directory** to `deploy/bridge` in the Netlify UI;
# leave **Base directory** empty so it defaults to the repo root. Per Netlify monorepo
# docs, `functions` and `publish` below are relative to the base directory (repo root),
# not to this folder — do not use `../..` here (that escapes the repo and fails deploy).
[build]
  command = "npm install && node scripts/netlify-redirects.mjs && cd hub/gateway && npm ci && cd ../bridge && npm ci"
  functions = "netlify/functions"
  publish = "public"

[build.environment]
  # Netlify’s build tooling can error on Node 22 (e.g. @netlify/build internal TypeError).
  # Gateway site uses root netlify.toml with NODE_VERSION=20; bridge must pin the same.
  NODE_VERSION = "20"
  USE_BRIDGE_FUNCTION = "true"

# Bridge index/search loads sqlite-vec + better-sqlite3 native code; must not be esbuild-bundled
# (sqlite-vec getLoadablePath uses import.meta.url — bundling yields Invalid URL input '.').
[functions]
  node_bundler = "esbuild"
  external_node_modules = [
    "better-sqlite3",
    "sqlite-vec",
    "sqlite-vec-linux-x64",
    "sqlite-vec-linux-arm64",
    "sqlite-vec-darwin-x64",
    "sqlite-vec-darwin-arm64",
    "sqlite-vec-windows-x64"
  ]

# Back up now (/api/v1/vault/sync) can exceed the default ~10s limit (export + N proposal GETs + GitHub API).
# Align with gateway proxy budget (root netlify.toml [functions."gateway"] timeout = 60).
# Raised 26 → 60 (Netlify sync-function platform max per docs.netlify.com/build/functions/overview)
# so POST /api/v1/index has headroom under DeepInfra embedding latency. See
# `hub/bridge/index-timing.mjs` for per-step instrumentation that lets us identify
# which sub-step dominates before choosing parallelize/async as the next step.
# exceljs: see root netlify.toml [functions."bridge"] (large bundle; keep external for the bridge function).
[functions."bridge"]
  timeout = 60
  external_node_modules = ["exceljs"]

# Background function: receives kickoff from the sync `bridge` function when the
# auto-routing preflight in `hub/bridge/server.mjs POST /api/v1/index` decides a
# re-index won't fit in 60 s (large vault, dim migration, first-time index, etc.).
# The `-background` filename suffix is what makes Netlify treat this as a
# background function (15-min platform max, returns 202 to caller within ~50 ms).
# See `netlify/functions/bridge-index-background.mjs` and
# `lib/bridge-index-preflight-estimate.mjs` for the routing math.
# external_node_modules: same as the sync bridge function (sqlite-vec native code,
# exceljs is large) — both functions import the same Express app and need the
# same modules left external.
[functions."bridge-index-background"]
  external_node_modules = ["exceljs"]

# Passthrough for direct Netlify-function URLs. MUST appear BEFORE the catch-all
# below — Netlify processes redirects top-down and first match wins.
#
# Why this exists (May 2026 hotfix): the catch-all rule below captures EVERY
# URL — and its forced rewrite BYPASSES Netlify's normal exemption for
# /.netlify/... paths (verified empirically: a kickoff fetch from the sync bridge
# function to /.netlify/functions/bridge-index-background was being rewritten to
# /.netlify/functions/bridge/.netlify/functions/bridge-index-background, which
# the bridge function 404'd on, silently breaking the auto-routing path).
# This explicit passthrough rule reaches the redirect engine first for any
# /.netlify/functions/* URL and rewrites the path to itself, preventing the
# catch-all from clobbering it. See the hotfix PR for PR #205 + tests in
# `test/bridge-index-auto-routing-contract.test.mjs`.
[[redirects]]
  from = "/.netlify/functions/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Send all OTHER requests to the bridge function with path preserved (/:splat).
# Anything matching `/.netlify/functions/*` is short-circuited above; this rule
# only sees app-level paths like `/api/v1/index`, `/api/v1/search`, etc.
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/bridge/:splat"
  status = 200
  force = true
