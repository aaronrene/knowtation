# Bridge site only. Use this by setting Package directory to "deploy/bridge" in the
# knowtation-bridge Netlify site (Build settings). Redirects live here so we do not
# depend on public/_redirects being deployed.
[build]
  command = "npm install && node scripts/netlify-redirects.mjs && cd hub/gateway && npm ci && cd ../bridge && npm ci"
  functions = "netlify/functions"
  publish = "public"

# Send all requests to the bridge function with path preserved (/:splat).
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/bridge/:splat"
  status = 200
  force = true
