name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    # Requires Dependency Graph + GitHub Advanced Security (free on public repos,
    # paid on private). The npm audit step in ci.yml already catches the same CVEs,
    # so this is supplementary — don't block PRs if GHAS is unavailable.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
