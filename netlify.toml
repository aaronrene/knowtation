# Knowtation: gateway runs as a Netlify serverless function; static site is on 4Everland.
[build]
  command = "npm install && node scripts/netlify-redirects.mjs && cd hub/gateway && npm ci && cd ../bridge && npm ci"
  functions = "netlify/functions"
  publish = "public"

# Catch-all routing lives in public/_redirects (scripts/netlify-redirects.mjs). Do not add
# [[redirects]] here: in a monorepo, root netlify.toml settings apply to every linked site
# and would send the bridge deploy to the gateway function.
