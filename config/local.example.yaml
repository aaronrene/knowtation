# Copy to config/local.yaml and set your paths. Do not commit config/local.yaml.
# Full schema: docs/SPEC.md §4.4. Use env for secrets (e.g. OPENAI_API_KEY).

# --- Required ---
# Absolute path to the vault (Obsidian-style Markdown root)
# vault_path: /absolute/path/to/knowtation/vault
# Or env: KNOWTATION_VAULT_PATH

# --- Vector store (one of) ---
# Qdrant: requires a running Qdrant server. Use for multi-process or scale.
# qdrant_url: http://localhost:6333
# Or env: QDRANT_URL
# vector_store: qdrant
#
# sqlite-vec: no separate server; DB under data_dir. Use for single-machine, simple setup.
# vector_store: sqlite-vec
# data_dir: data/       # env KNOWTATION_DATA_DIR; DB file: data/knowtation_vectors.db
# Or env: KNOWTATION_VECTOR_STORE=sqlite-vec

# --- Embedding (indexer and search) ---
# embedding:
#   provider: ollama
#   model: nomic-embed-text
#   # ollama_url: http://localhost:11434   # optional override
# For OpenAI: set OPENAI_API_KEY in env and use provider: openai, model: text-embedding-3-small

# --- Indexer chunking (optional) ---
# indexer:
#   chunk_size: 2048    # chars (~512 tokens); overlap below
#   chunk_overlap: 256

# --- Transcription (audio/video import) ---
# transcription:
#   provider: openai
#   model: whisper-1
# Requires OPENAI_API_KEY in env. Get key: platform.openai.com → API Keys. New accounts get $5 free credits; Whisper ~$0.006/min.

# --- Optional: memory layer (store last search, export provenance) ---
# memory:
#   enabled: true
#   provider: file   # stores in data/memory.json
#   # url: http://localhost:8080   # for Mem0; env KNOWTATION_MEMORY_URL

# --- Optional: AIR attestation (before write non-inbox, before export) ---
# air:
#   enabled: false
#   endpoint: http://localhost:3000
# Or env: KNOWTATION_AIR_ENDPOINT

# --- Vault Git (optional backup / versioning) ---
# vault:
#   git:
#     enabled: true
#     remote: https://github.com/you/your-vault-repo.git
#     auto_commit: false   # set true to auto-commit after Hub write/capture/approve (and CLI write if using Hub)
#     auto_push: false     # set true to push after each auto-commit (requires remote)
# Proposals stay Hub-only; Git is for the vault content. See PROVENANCE-AND-GIT.md.

# --- Reserved: Phase 12 (blockchain / agent payments) ---
# Future config may add blockchain or payment-related keys. No keys in current schema.
